server:
  port: 8080

spring:
  datasource:
    url: jdbc:sqlite:./data/signals.db
    driver-class-name: org.sqlite.JDBC
  jackson:
    serialization:
      write-dates-as-timestamps: false

app:
  webhook-secret: ${WEBHOOK_SECRET:change-me}
  scanner:
    range: 2y
    interval: 1d
    strategy-name: "SMA Strategy: 20/50/200"
    pause-millis: 350
