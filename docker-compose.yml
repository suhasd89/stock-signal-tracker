services:
  backend:
    build:
      context: ./backend
    container_name: stock-tracker-backend
    ports:
      - "8080:8080"
    volumes:
      - backend-data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
    container_name: stock-tracker-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"
    restart: unless-stopped

volumes:
  backend-data:
